<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoClaw — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a26;
      --bg-input: #16161f;
      --border: #2a2a3a;
      --text-primary: #e8e8f0;
      --text-secondary: #8888aa;
      --text-muted: #555577;
      --accent: #7c5cff;
      --accent-hover: #9477ff;
      --red: #f87171;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.15);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }

    .login-btn:hover { background: var(--accent-hover); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: 13px;
      color: var(--red);
      display: none;
    }

    .error-msg.visible { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🧠 MemoClaw</h1>
      <p>Sign in to your memory dashboard</p>
    </div>

    <div class="login-card">
      <div id="error-msg" class="error-msg"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 placeholder="admin" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password"
                 placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>
    </div>

    <div class="login-footer">
      Default credentials configured via environment variables
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('error-msg');
      errorEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (res.ok && data.status === 'ok') {
          window.location.href = '/';
        } else {
          errorEl.textContent = data.detail || data.error || 'Invalid credentials';
          errorEl.classList.add('visible');
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Is the server running?';
        errorEl.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // If pressing Enter in password field
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin(e);
    });
  </script>
</body>
</html>
