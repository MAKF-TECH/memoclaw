<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoClaw — Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { surface: { 900:'#0b0b12', 950:'#07070d' }, brand: { 400:'#8b5cf6', 500:'#7c3aed', 600:'#6d28d9' } }, fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-surface-950 text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-500/10 border border-brand-500/20 mb-4">
        <span class="text-2xl">🧠</span>
      </div>
      <h1 class="text-xl font-bold tracking-tight">MemoClaw</h1>
      <p class="text-sm text-gray-500 mt-1.5">Sign in to your memory dashboard</p>
    </div>

    <!-- Card -->
    <div class="bg-white/[0.03] border border-white/[0.06] rounded-xl p-6">
      <div id="err" class="hidden bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-2.5 mb-4 text-xs text-red-400"></div>

      <form onsubmit="login(event)">
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-500 mb-1.5">Username</label>
          <input type="text" id="user" autocomplete="username" required autofocus
            class="w-full bg-white/[0.03] border border-white/[0.08] rounded-lg px-3.5 py-2.5 text-sm text-gray-200 placeholder:text-gray-600 outline-none focus:border-brand-400/50 focus:ring-1 focus:ring-brand-400/20 transition-all"
            placeholder="admin">
        </div>
        <div class="mb-5">
          <label class="block text-xs font-medium text-gray-500 mb-1.5">Password</label>
          <input type="password" id="pass" autocomplete="current-password" required
            class="w-full bg-white/[0.03] border border-white/[0.08] rounded-lg px-3.5 py-2.5 text-sm text-gray-200 placeholder:text-gray-600 outline-none focus:border-brand-400/50 focus:ring-1 focus:ring-brand-400/20 transition-all"
            placeholder="••••••••">
        </div>
        <button type="submit" id="btn"
          class="w-full py-2.5 bg-brand-500 hover:bg-brand-400 text-white text-sm font-semibold rounded-lg transition-colors shadow-sm">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-[11px] text-gray-600 mt-5">Default: admin / memoclaw — change in .env</p>
  </div>

  <script>
    async function login(e) {
      e.preventDefault();
      const btn = document.getElementById('btn'), err = document.getElementById('err');
      err.classList.add('hidden'); btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value }) });
        const d = await r.json();
        if (r.ok && d.status === 'ok') location.href = '/';
        else { err.textContent = d.detail || 'Invalid credentials'; err.classList.remove('hidden'); }
      } catch { err.textContent = 'Connection error'; err.classList.remove('hidden'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    }
  </script>
</body>
</html>
